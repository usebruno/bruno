name: typed_env

variables:
  - name: env_str
    value: env_string
  - name: env_num
    value:
      type: number
      data: "300"
  - name: env_bool
    value:
      type: boolean
      data: "true"
  - name: env_obj
    value:
      type: object
      data: '{"scope":"env"}'
  - name: mismatched_num
    value:
      type: number
      data: "not-a-number"
  - name: mismatched_bool
    value:
      type: boolean
      data: "maybe"
  - name: mismatched_obj
    value:
      type: object
      data: "not-json"
  - secret: true
    name: env_secret_str
