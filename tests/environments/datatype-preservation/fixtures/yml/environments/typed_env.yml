    value:
      type: number
      data: "not-a-number"
  - name: mismatched_bool
    value:
      type: boolean
      data: "maybe"
  - name: mismatched_obj
    value:
      type: object
      data: "not-json"
  - secret: true
    name: env_secret_str
  - secret: true
    name: env_secret_num
    type: number
  - secret: true
    name: env_secret_bool
    type: boolean
  - secret: true
    name: env_secret_obj
    type: object
  - secret: true
    name: env_secret_untyped
