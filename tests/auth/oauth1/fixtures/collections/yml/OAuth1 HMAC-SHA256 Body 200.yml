info:
  name: OAuth1 HMAC-SHA256 Body 200
  type: http
  seq: 19

http:
  method: POST
  url: "{{localhost}}/api/auth/oauth1/resource"
  auth:
    type: oauth1
    consumerKey: consumer_key_1
    consumerSecret: consumer_secret_1
    accessToken: access_token_1
    tokenSecret: token_secret_1
    signatureMethod: HMAC-SHA256
    version: "1.0"
    addParamsTo: body
    includeBodyHash: false

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.resource.name
      operator: eq
      value: oauth1-test-resource

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
