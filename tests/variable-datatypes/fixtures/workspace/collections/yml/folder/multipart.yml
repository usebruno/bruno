info:
  name: multipart
  type: http
  seq: 5

http:
  method: POST
  url: '{{localhost}}/api/echo/everything'
  body:
    type: multipart-form
    data:
      - name: mp_str
        type: text
        value: "{{mp_str}}"
      - name: mp_num
        type: text
        value: "{{mp_num}}"
      - name: mp_bool
        type: text
        value: "{{mp_bool}}"
      - name: mp_obj
        type: text
        value: "{{mp_obj}}"

runtime:
  variables:
    - name: mp_str
      value: form_string
    - name: mp_num
      value:
        type: number
        data: "42"
    - name: mp_bool
      value:
        type: boolean
        data: "true"
    - name: mp_obj
      value:
        type: object
        data: '{"key":"value"}'
  scripts:
    - type: tests
      code: |-
        test("multipart text fields stringify typed values on the wire", () => {
          const raw = res.getBody().body;
          const fieldValue = (name) => {
            const match = raw.match(new RegExp(`name="${name}"\\r?\\n\\r?\\n([\\s\\S]*?)\\r?\\n--`));
            return match && match[1];
          };
          expect(fieldValue("mp_str")).to.equal("form_string");
          expect(fieldValue("mp_num")).to.equal("42");
          expect(fieldValue("mp_bool")).to.equal("true");
          expect(fieldValue("mp_obj")).to.equal('{"key":"value"}');
        });

settings:
  encodeUrl: true
  timeout: 0
