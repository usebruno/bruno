name: 'Run Benchmark Tests'
description: 'Run Playwright benchmark tests and compare against baseline'
inputs:
  os:
    description: 'Operating system (ubuntu, macos, windows)'
    default: 'ubuntu'
  update-baseline:
    description: 'Update baseline instead of comparing'
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Run Benchmark Tests (Ubuntu)
      if: inputs.os == 'ubuntu'
      shell: bash
      run: xvfb-run npm run test:benchmark

    - name: Run Benchmark Tests
      if: inputs.os != 'ubuntu'
      shell: bash
      run: npm run test:benchmark

    # Runner memory benchmark — deterministic guard against the QuickJS sandbox
    # leak (memory growing per request, see BRU memory regression). It drives the
    # real bruno-js script/assertion paths and self-asserts hard thresholds on
    # WASM memory growth. No web server required, runs on every OS.
    - name: Run Runner Memory Benchmark
      shell: bash
      run: npm run test:benchmark:memory

    - name: Update Baseline
      if: inputs.update-baseline == 'true'
      shell: bash
      run: >-
        node tests/benchmarks/utils/compare.js
        --results tests/benchmarks/results/mounting.json
        --baseline tests/benchmarks/mounting/baseline.${{ inputs.os }}.json
        --update-baseline

    - name: Compare Against Baseline
      if: inputs.update-baseline != 'true'
      shell: bash
      run: >-
        node tests/benchmarks/utils/compare.js
        --results tests/benchmarks/results/mounting.json
        --baseline tests/benchmarks/mounting/baseline.${{ inputs.os }}.json
