name: 'Run E2E Tests'
description: 'Setup dependencies, configure environment, and run Playwright E2E tests'
inputs:
  os:
    description: 'Operating system (ubuntu, macos, windows)'
    default: 'ubuntu'
  shell:
    description: 'Shell to use (bash, pwsh)'
    required: false
    default: 'bash'
runs:
  using: 'composite'
  steps:
    - name: Install Test Collection Dependencies
      shell: ${{ inputs.shell }}
      run: npm ci --prefix packages/bruno-tests/collection

    # E2E_WEB_SERVER=build serves a production web build instead of the dev
    # server, whose watcher/compile stalls left Electron launches hanging on CI.
    - name: Run Playwright Tests (Ubuntu)
      if: inputs.os == 'ubuntu'
      shell: bash
      env:
        E2E_WEB_SERVER: build
      run: xvfb-run dbus-run-session -- npm run test:e2e

    - name: Run Playwright Tests
      if: inputs.os != 'ubuntu'
      shell: ${{ inputs.shell }}
      env:
        E2E_WEB_SERVER: build
      run: npm run test:e2e
