name: 'run e2e tests with proxy OFF - linux'
runs:
  using: 'composite'
  steps:
    - name: Run Proxy E2E tests - Proxy OFF
      shell: bash
      run: |
        set -euo pipefail
        
        npm run test:e2e:proxy-off

    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-proxy-off-macos
        path: playwright-report/
        retention-days: 30