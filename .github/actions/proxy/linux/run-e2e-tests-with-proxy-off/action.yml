name: 'run e2e tests with proxy OFF - linux'
runs:
  using: 'composite'
  steps:
    - name: run e2e tests with proxy OFF
      shell: bash
      run: |
        set -euo pipefail
        
        xvfb-run npm run test:e2e:proxy-off

    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-proxy-off-linux
        path: playwright-report/
        retention-days: 30

