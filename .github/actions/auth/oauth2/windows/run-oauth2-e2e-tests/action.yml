name: 'Run OAuth2 E2E Tests - Windows'
description: 'Run OAuth2 (Keycloak) E2E tests on Windows'
runs:
  using: 'composite'
  steps:
    - name: Run OAuth2 E2E tests
      shell: pwsh
      run: |
        npm run test:e2e:auth:oauth2

    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-oauth2-windows
        path: playwright-report/
        retention-days: 30
