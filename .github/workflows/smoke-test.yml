name: Smoke Test
on:
  workflow_dispatch:
  push:
    branches: [main, 'release/v*']
  pull_request:
    branches: [main, 'release/v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke Test (Linux)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get --no-install-recommends install -y \
            libglib2.0-0 libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgtk-3-0 libasound2t64 \
            xvfb \
            gsettings-desktop-schemas dbus-x11

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Configure Chrome Sandbox
        run: |
          CHROME_SANDBOX="${GITHUB_WORKSPACE}/node_modules/electron/dist/chrome-sandbox"
          if [[ -f "$CHROME_SANDBOX" ]]; then
            sudo chown root "$CHROME_SANDBOX"
            sudo chmod 4755 "$CHROME_SANDBOX"
          fi

      - name: Run Smoke Test
        run: xvfb-run dbus-run-session -- npm run test:smoke

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7
