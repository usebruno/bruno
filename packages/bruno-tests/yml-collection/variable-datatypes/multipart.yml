info:
  name: multipart
  type: http
  seq: 4

http:
  method: POST
  url: '{{echo-host}}'
  body:
    type: multipart-form
    data:
      - name: mp_str
        type: text
        value: '{{mp_str}}'
      - name: mp_num
        type: text
        value: '{{mp_num}}'
      - name: mp_bool
        type: text
        value: '{{mp_bool}}'
      - name: mp_obj
        type: text
        value: '{{mp_obj}}'

runtime:
  variables:
    - name: mp_str
      value: form_string
    - name: mp_num
      value:
        type: number
        data: "42"
    - name: mp_bool
      value:
        type: boolean
        data: "true"
    - name: mp_obj
      value:
        type: object
        data: '{"key":"value"}'
  scripts:
    - type: tests
      code: |-
        test("multipart text fields stringify typed values on the wire", () => {
          const raw = res.getBody();
          expect(raw).to.contain("form_string");
          expect(raw).to.match(/name="mp_num"[\s\S]*?\r?\n\r?\n42/);
          expect(raw).to.match(/name="mp_bool"[\s\S]*?\r?\n\r?\ntrue/);
          expect(raw).to.contain('{"key":"value"}');
        });

settings:
  encodeUrl: true
  timeout: 0
